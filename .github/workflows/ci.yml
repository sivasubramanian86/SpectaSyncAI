name: SpectaSyncAI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: spectasyncai
  REGION: us-central1

jobs:
  # ─── Backend: Lint + Test ─────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 agents/ api/ mcp_server/ --max-line-length=100 --ignore=E501,W503

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=agents --cov=api --cov-report=xml --cov-fail-under=75
        env:
          DATABASE_URL: ""
          MCP_SERVER_URL: "http://localhost:8001/sse"

  # ─── Frontend: Build ──────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

